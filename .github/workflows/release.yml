name: Release Plugin

on:
  release:
    types: [created]
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Java 21
        uses: actions/setup-java@v5
        with:
          java-version: 21
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v5

      - name: Get project version
        id: get_version
        run: |
          VERSION=$(./gradlew properties -q | grep "^version:" | awk '{print $2}')
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Plugin version: $VERSION"

      - name: Build and Sign Plugin
        run: ./gradlew signPlugin

      - name: Find signed artifact
        id: artifact
        run: |
          ZIP=$(find build/distributions -name '*-signed.zip' | head -1)
          echo "path=$ZIP" >> "$GITHUB_OUTPUT"

      # Publish the plugin to JetBrains Marketplace
      - name: Publish Plugin
        env:
          PUBLISH_TOKEN: ${{ secrets.PUBLISH_TOKEN }}
          CERTIFICATE_CHAIN: ${{ secrets.CERTIFICATE_CHAIN }}
          PRIVATE_KEY: ${{ secrets.PRIVATE_KEY }}
          PRIVATE_KEY_PASSWORD: ${{ secrets.PRIVATE_KEY_PASSWORD }}
        run: ./gradlew publishPlugin

      - name: Upload release asset
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ steps.artifact.outputs.path }}

      - name: Generate SHA256 checksum
        run: |
          sha256sum ${{ steps.artifact.outputs.path }} > checksum.txt
          cat checksum.txt

      - name: Upload checksum
        uses: softprops/action-gh-release@v2
        with:
          files: ./checksum.txt
